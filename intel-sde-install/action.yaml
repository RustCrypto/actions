name: "intel-sde-install"
description: "Install Intel SDE"
inputs:
  sde-full-version:
    description: "SDE full version"
    required: true
runs:
  using: composite
  steps:
    # yamllint disable rule:line-length
    - shell: bash
      run: |
        curl -JLO "https://raw.githubusercontent.com/RustCrypto/third-party/refs/heads/master/intel-sde-external-${{ inputs.sde-full-version }}-lin.tar.xz"
        tar xvf intel-sde-external-${{ inputs.sde-full-version }}-lin.tar.xz -C /opt
    # yamllint disable rule:line-length
    - shell: bash
      run: echo "/opt/sde-external-${{ inputs.sde-full-version }}-lin" >> $GITHUB_PATH
